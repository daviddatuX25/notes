server {
    listen 80;
    server_name notes.dxtechph.online;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript image/svg+xml text/xml application/atom+xml;
    gzip_min_length 512;

    # Pretty URLs: /posts/slug → /posts/slug/index.html
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Cache-bust: assets live forever (rebuilt on deploy, filenames don't change)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # RSS: short cache, correct content-type
    location = /feed.xml {
        expires 1h;
        add_header Content-Type "application/atom+xml; charset=utf-8";
    }

    # Don't log favicon.ico 404s
    location = /favicon.ico {
        log_not_found off;
    }
}
